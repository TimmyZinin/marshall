version: "3.8"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: marshall
      POSTGRES_USER: marshall
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marshall"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: marshall
      DB_USER: marshall
      DB_PASS: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DEMO_MODE: ${DEMO_MODE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - ./src:/app/src

volumes:
  pgdata:
